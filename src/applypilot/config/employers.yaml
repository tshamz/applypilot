# ─────────────────────────────────────────────────────────────────────────────
# Greenhouse-powered career boards.
#
# Slugs are the Greenhouse "board token" — find one for any company by
# visiting their careers page; the URL usually contains `boards.greenhouse.io/
# {slug}` or the page itself calls `boards-api.greenhouse.io/v1/boards/{slug}`.
# You can verify a slug works by hitting:
#   https://boards-api.greenhouse.io/v1/boards/{slug}/jobs
# (HTTP 200 = good, 404 = wrong slug)
# ─────────────────────────────────────────────────────────────────────────────

greenhouse:

  # ── Payments & Fintech ─────────────────────────────────────────────────
